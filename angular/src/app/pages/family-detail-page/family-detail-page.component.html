<mat-card *ngIf="family !== null" class="infos">
  <mat-form-field>
    <mat-label>Nom</mat-label>
    <input matInput type="text" [(ngModel)]="family.name" />
  </mat-form-field>
  <mat-form-field>
    <mat-label>Capacite</mat-label>
    <input matInput type="number" [(ngModel)]="family.capacity" />
  </mat-form-field>
</mat-card>

<action-sidebar [actionList]="actionList"></action-sidebar>
